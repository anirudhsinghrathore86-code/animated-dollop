<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdish Sweets & Colddrinks</title>
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --saffron: #FF9933;
            --deep-red: #8B0000;
            --gold: #D4AF37;
            --cream: #FFFDD0;
            --dark-cinematic: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: #333;
        }

        header {
            background: var(--deep-red);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        header h1 {
            font-family: 'Rozha One', serif;
            font-size: 2.5rem;
            color: var(--gold);
        }

        .container { max-width: 1100px; margin: auto; padding: 2rem 1rem; }

        /* Cinematic Gallery */
        .gallery-section {
            background: var(--dark-cinematic);
            padding: 4rem 1rem;
            color: white;
            border-radius: 20px;
        }

        .gallery-title { text-align: center; margin-bottom: 2rem; }
        .gallery-title h2 { font-family: 'Rozha One', serif; color: var(--saffron); font-size: 2rem; }

        .cinematic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-auto-rows: 250px;
            gap: 15px;
            grid-auto-flow: dense;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
            transition: 0.5s;
        }

        .gallery-item:hover img {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* Layout styles */
        .tall { grid-row: span 2; }
        .wide { grid-column: span 2; }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) {
            .wide { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Jagdish Sweets</h1>
        <p>Sheoganj, Rajasthan</p>
    </header>

    <div class="container">
        <section class="gallery-section">
            <div class="gallery-title">
                <h2>Cinematic Gallery</h2>
                <p>Pure Veg Delights</p>
            </div>

            <div class="cinematic-grid">
                <div class="gallery-item tall">
                    <img src="IMG_20260421_205146.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item">
                    <img src="IMG_20260421_205211.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item wide">
                    <img src="IMG_20260421_205237.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item">
                    <img src="IMG_20260421_205423.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item tall">
                    <img src="IMG_20260421_205435.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item">
                    <img src="IMG_20260421_205448.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item">
                    <img src="IMG_20260421_205528.jpg" alt="Sweet Shop">
                </div>
                <div class="gallery-item">
                    <img src="IMG_20260421_205549.jpg" alt="Sweet Shop">
                </div>
            </div>
        </section>
    </div>

    <footer>
        <p>Jagdish Sweets & Colddrinks © 2026</p>
    </footer>

</body>
</html>
