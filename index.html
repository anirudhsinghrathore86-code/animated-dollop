<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdish Sweets & Colddrinks | Cinematic</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --saffron: #FF9933;
            --deep-red: #8B0000;
            --gold: #D4AF37;
            --cream: #FFFDD0;
            --dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream);
            color: #333;
            overflow-x: hidden;
        }

        /* --- Traditional Header --- */
        header {
            background: var(--deep-red);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        header h1 {
            font-family: 'Rozha One', serif;
            font-size: 2.8rem;
            color: var(--gold);
        }

        .social-icons {
            margin-top: 15px;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-icons a:hover { color: var(--saffron); }

        /* --- Main Content --- */
        .container { max-width: 1100px; margin: auto; padding: 2rem 1rem; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--saffron);
        }

        /* --- CINEMATIC SWIPE GALLERY --- */
        .gallery-container {
            background: var(--dark);
            padding: 4rem 0;
            color: white;
            text-align: center;
        }

        .swiper { width: 100%; padding: 50px 0; }

        .swiper-slide {
            width: 300px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--gold);
            transition: 0.5s;
        }

        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* --- GOOGLE MAP SECTION --- */
        .map-section {
            margin-top: 3rem;
            text-align: center;
        }

        .map-section h2 { font-family: 'Rozha One', serif; margin-bottom: 1.5rem; color: var(--deep-red); }

        .map-frame {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        footer {
            background: #111;
            color: #777;
            text-align: center;
            padding: 2.5rem;
            margin-top: 2rem;
        }

        .btn {
            display: inline-block;
            background: var(--saffron);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>Jagdish Sweets</h1>
        <p>Pure Traditional Halwai | Sheoganj</p>
        <div class="social-icons">
            <a href="https://www.facebook.com/jagdish.sweets.98" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/jagdishsweetsandsons" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="card-grid">
            <div class="card">
                <h3>Our Location</h3>
                <p>Halwai bazar, Dargah Sangh IV Nagar, Sheoganj, Rajasthan 307027</p>
                <p style="margin-top:10px; font-weight:600; color:#2e7d32;">Open: 7:30 AM - 10:30 PM</p>
            </div>
            <div class="card">
                <h3>Contact Us</h3>
                <p>Phone: 094148 42777</p>
                <a href="tel:09414842777" class="btn" style="margin-top:10px;">Call Now</a>
            </div>
        </div>

        <section class="map-section">
            <h2>Find Us Here</h2>
            <iframe 
                class="map-frame"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3596.8615967663243!2d73.06588487536768!3d25.139980277750875!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3942eb5e9f999695%3A0x4249a949ea2e1ed1!2sJagdish%20Sweets%20%26%20colddrinks!5e0!3m2!1sen!2sin!4v1713728000000!5m2!1sen!2sin" 
                allowfullscreen="" loading="lazy"></iframe>
        </section>
    </div>

    <div class="gallery-container">
        <h2 style="font-family: 'Rozha One', serif; color: var(--saffron); font-size: 2.2rem; margin-bottom: 1rem;">Taste the Tradition</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="IMG_20260421_205146.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205211.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205237.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205423.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205435.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205448.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205528.jpg"></div>
                <div class="swiper-slide"><img src="IMG_20260421_205549.jpg"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <footer>
        <p>Jagdish Sweets & Colddrinks © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            coverflowEffect: { rotate: 30, stretch: 0, depth: 150, modifier: 1, slideShadows: true },
            loop: true,
            autoplay: { delay: 2500, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination" },
        });
    </script>
</body>
</html>
